<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>서울 시계</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;

      font-family:
        Pretendard,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .clock-widget {
      position: relative;
      width: 100%;
      max-width: 650px;
      padding: 26px 24px 23px;
      overflow: hidden;

      background:
        radial-gradient(
          circle at top right,
          rgba(255, 255, 255, 0.95),
          transparent 35%
        ),
        linear-gradient(
          135deg,
          #fff9f4 0%,
          #fff1f6 50%,
          #f5f0ff 100%
        );

      border: 1px solid rgba(218, 179, 196, 0.45);
      border-radius: 25px;

      box-shadow:
        0 12px 32px rgba(129, 93, 111, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);

      text-align: center;
    }

    .decoration {
      position: absolute;
      z-index: 0;
      opacity: 0.55;
      pointer-events: none;
    }

    .decoration-left {
      top: 19px;
      left: 22px;
      font-size: 22px;
      transform: rotate(-12deg);
    }

    .decoration-right {
      right: 22px;
      bottom: 19px;
      font-size: 21px;
      transform: rotate(10deg);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .location {
      margin-bottom: 7px;
      color: #927383;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .time {
      color: #55414b;
      font-size: clamp(38px, 10vw, 62px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: 1px;

      font-variant-numeric: tabular-nums;

      text-shadow:
        0 3px 0 rgba(255, 255, 255, 0.8);
    }

    .seconds {
      color: #b28599;
      font-size: 0.55em;
      font-weight: 700;
    }

    .date {
      margin-top: 12px;
      color: #725864;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .greeting {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 15px;

      background: rgba(255, 255, 255, 0.67);
      border: 1px solid rgba(218, 184, 199, 0.38);
      border-radius: 999px;

      color: #8e687a;
      font-size: 12px;
      font-weight: 700;

      box-shadow: 0 5px 13px rgba(121, 89, 104, 0.08);
    }

    .progress-line {
      width: 70%;
      height: 5px;
      margin: 18px auto 0;
      overflow: hidden;

      background: rgba(192, 158, 175, 0.2);
      border-radius: 999px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;

      background: linear-gradient(
        90deg,
        #f3a7bd,
        #c5a8e7
      );

      border-radius: inherit;
      transition: width 0.8s ease;
    }

    .day-progress {
      margin-top: 7px;
      color: #ab8797;
      font-size: 10px;
      font-weight: 600;
    }

    @media (max-width: 460px) {
      .clock-widget {
        padding: 23px 15px 20px;
        border-radius: 20px;
      }

      .location {
        font-size: 12px;
      }

      .date {
        font-size: 14px;
      }

      .decoration-left,
      .decoration-right {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="clock-widget">
    <div class="decoration decoration-left">☁️</div>
    <div class="decoration decoration-right">✨</div>

    <div class="content">
      <div class="location" id="location">
        서울 · 현재 시간
      </div>

      <div class="time">
        <span id="hourMinute">00:00</span>
        <span class="seconds" id="seconds">00</span>
      </div>

      <div class="date" id="date">
        날짜를 불러오는 중
      </div>

      <div class="greeting" id="greeting">
        오늘도 좋은 하루 보내세요 🌷
      </div>

      <div class="progress-line">
        <div
          class="progress-fill"
          id="progressFill"
        ></div>
      </div>

      <div class="day-progress" id="dayProgress">
        오늘의 시간 0%
      </div>
    </div>
  </main>

  <script>
    const TIME_ZONE = "Asia/Seoul";

    const koreanWeekdays = {
      Sun: "일요일",
      Mon: "월요일",
      Tue: "화요일",
      Wed: "수요일",
      Thu: "목요일",
      Fri: "금요일",
      Sat: "토요일"
    };

    function getKoreaTime() {
      const formatter = new Intl.DateTimeFormat(
        "en-CA",
        {
          timeZone: TIME_ZONE,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hourCycle: "h23"
        }
      );

      const parts = formatter.formatToParts(new Date());
      const values = {};

      for (const part of parts) {
        if (part.type !== "literal") {
          values[part.type] = part.value;
        }
      }

      return {
        year: Number(values.year),
        month: Number(values.month),
        day: Number(values.day),
        weekday: values.weekday,
        hour: Number(values.hour),
        minute: Number(values.minute),
        second: Number(values.second)
      };
    }

    function twoDigits(number) {
      return String(number).padStart(2, "0");
    }

    function getGreeting(hour, weekday) {
      const isWeekend =
        weekday === "Sat" ||
        weekday === "Sun";

      if (isWeekend) {
        return "오늘은 여유롭게 쉬어가요 🌿";
      }

      if (hour < 6) {
        return "아직 포근한 새벽이에요 🌙";
      }

      if (hour < 9) {
        return "좋은 아침이에요 ☀️";
      }

      if (hour < 12) {
        return "오늘도 차근차근 해봐요 🐰";
      }

      if (hour < 14) {
        return "맛있는 점심시간이에요 🍽️";
      }

      if (hour < 18) {
        return "퇴근까지 조금만 더 힘내요 🌷";
      }

      if (hour < 22) {
        return "오늘 하루도 고생 많았어요 ✨";
      }

      return "편안한 밤 보내세요 🌙";
    }

    function updateClock() {
      const now = getKoreaTime();

      const hourMinute =
        document.getElementById("hourMinute");

      const seconds =
        document.getElementById("seconds");

      const date =
        document.getElementById("date");

      const location =
        document.getElementById("location");

      const greeting =
        document.getElementById("greeting");

      const progressFill =
        document.getElementById("progressFill");

      const dayProgress =
        document.getElementById("dayProgress");

      hourMinute.textContent =
        `${twoDigits(now.hour)}:${twoDigits(now.minute)}`;

      seconds.textContent =
        twoDigits(now.second);

      const weekday =
        koreanWeekdays[now.weekday];

      date.textContent =
        `${now.year}년 ${now.month}월 ${now.day}일 ${weekday}`;

      location.textContent =
        `서울 · ${weekday}`;

      greeting.textContent =
        getGreeting(now.hour, now.weekday);

      const elapsedSeconds =
        now.hour * 3600 +
        now.minute * 60 +
        now.second;

      const totalDaySeconds =
        24 * 3600;

      const percentage =
        elapsedSeconds / totalDaySeconds * 100;

      progressFill.style.width =
        `${percentage}%`;

      dayProgress.textContent =
        `오늘의 시간 ${Math.floor(percentage)}%`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
